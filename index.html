<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Syntech \u2014 Training Portal</title>
<style>
:root{--g:#00C853;--gd:rgba(0,200,83,0.12);--k:#0A0A0A;--s:#111;--s2:#1A1A1A;--s3:#222;--b:rgba(255,255,255,0.08);--bs:rgba(255,255,255,0.15);--t:#F0F0F0;--tm:#888;--td:#555;--r:#FF4444;--a:#FFAA00;--bl:#378ADD;--pk:#D4537E;--f:'Inter',-apple-system,sans-serif;--m:'JetBrains Mono',monospace;--rad:8px;--radl:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--k);color:var(--t);font-family:var(--f);font-size:14px;line-height:1.6;min-height:100vh;}
.hd-inner{display:flex;align-items:center;justify-content:space-between;padding:0 16px;}.hd-logo-img{height:64px;width:auto;display:block;}.hd{background:#000;border-bottom:2px solid #E8302A;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,0.6);}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;}.logo-chevrons{display:flex;align-items:center;gap:0px;}.logo-text{display:flex;flex-direction:column;gap:0px;}.logo-syntech{font-size:15px;font-weight:800;letter-spacing:.18em;color:#fff;line-height:1;font-family:var(--f);}.logo-sub{font-size:8.5px;font-weight:400;letter-spacing:.28em;color:rgba(255,255,255,0.55);line-height:1;margin-top:2px;font-family:var(--f);}.logo-portal{font-size:9px;font-weight:500;letter-spacing:.1em;color:#E8302A;margin-top:4px;text-transform:uppercase;font-family:var(--f);}
.tb{padding:4px 12px;border-radius:20px;border:1px solid var(--bs);background:transparent;color:var(--tm);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--f);transition:all .15s;}
.tb.on{background:#E8302A;color:#fff;border-color:#E8302A;}
.rb{padding:4px 10px;border-radius:var(--rad);border:1px solid var(--b);background:transparent;color:var(--td);font-size:11px;cursor:pointer;font-family:var(--f);}
.rb:hover{border-color:var(--r);color:var(--r);}
.mt{display:flex;background:#111;border-bottom:1px solid rgba(232,48,42,0.25);padding:0 24px;position:sticky;top:64px;z-index:99;}
.mt-btn{padding:12px 18px;font-size:13px;font-weight:500;color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.mt-btn.on{color:#E8302A;border-bottom-color:#E8302A;}
.vw{display:none;}.vw.on{display:block;}
.pl{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 100px);}
.sb{background:var(--s);border-right:1px solid var(--b);position:sticky;top:100px;height:calc(100vh - 100px);overflow-y:auto;padding:8px 0;}
.sb-sec{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--td);text-transform:uppercase;padding:10px 14px 4px;}
.sb-row{display:flex;align-items:center;gap:7px;padding:6px 14px;cursor:pointer;transition:background .12s;border-left:2px solid transparent;}
.sb-row:hover{background:var(--s2);}
.sb-dot{width:6px;height:6px;border-radius:50%;background:var(--td);flex-shrink:0;}
.sb-dot.dn{background:var(--g);}.sb-dot.lk{opacity:.3;}
.sb-nm{font-size:12px;color:var(--tm);flex:1;}
.sb-bg{font-size:10px;padding:1px 5px;border-radius:6px;font-family:var(--m);}
.bg-d{background:var(--gd);color:var(--g);}.bg-l{background:rgba(255,170,0,.1);color:var(--a);}.bg-a{background:rgba(55,138,221,.1);color:var(--bl);}
.ov{background:var(--s2);border-bottom:1px solid var(--b);padding:10px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;}
.ov-n{font-size:18px;font-weight:700;color:var(--g);font-family:var(--m);line-height:1;}
.ov-l{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.06em;}
.pt{height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-bottom:3px;}
.pf{height:100%;background:var(--g);border-radius:2px;transition:width .4s;}
.tc{display:flex;align-items:center;gap:7px;padding:4px 10px;background:var(--s3);border-radius:20px;border:1px solid var(--b);}
.av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.pm{padding:18px 22px;}
.sc{background:var(--s);border:1px solid var(--b);border-radius:var(--radl);margin-bottom:10px;overflow:hidden;}
.sc.lk{border-color:rgba(255,170,0,.2);}.sc.dn{border-color:rgba(0,200,83,.25);}
.sh{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;transition:background .12s;}
.sh:hover{background:var(--s2);}
.sn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bs);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--tm);font-family:var(--m);flex-shrink:0;}
.sc.dn .sn{border-color:var(--g);background:var(--gd);color:var(--g);}
.sc.lk .sn{border-color:rgba(255,170,0,.4);color:var(--a);}
.st{font-size:14px;font-weight:600;margin-bottom:1px;}.ss{font-size:11px;color:var(--tm);}
.wt{font-size:10px;padding:2px 6px;border-radius:4px;font-family:var(--m);font-weight:600;}
.wr{background:rgba(55,138,221,.15);color:var(--bl);}.wa{background:rgba(255,170,0,.15);color:var(--a);}.ws{background:rgba(212,83,126,.15);color:var(--pk);}.wt2{background:var(--gd);color:var(--g);}
.cv{color:var(--td);transition:transform .2s;flex-shrink:0;}
.sc.op .cv{transform:rotate(180deg);}
.sb2{display:none;border-top:1px solid var(--b);}.sc.op .sb2{display:block;}
.ps{border-bottom:1px solid var(--b);}.ps:last-of-type{border-bottom:none;}
.ph{display:flex;align-items:center;gap:7px;padding:7px 16px;background:var(--s2);}
.pd{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.pn{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;flex:1;}
.pp{font-size:10px;color:var(--td);font-family:var(--m);}
.tl{padding:4px 16px 8px;}
.ti{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);}
.ti:last-child{border-bottom:none;}
.ck{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--bs);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px;}
.ck:hover{border-color:var(--g);}.ck.on{background:var(--g);border-color:var(--g);}
.ck.on::after{content:'';width:7px;height:4px;border-left:2px solid #000;border-bottom:2px solid #000;transform:rotate(-45deg) translateY(-1px);display:block;}
.tx{font-size:12.5px;color:var(--t);line-height:1.5;}
.ti.dn .tx{color:var(--td);text-decoration:line-through;}
.tg{font-size:10px;padding:1px 4px;border-radius:3px;font-weight:500;margin-top:2px;display:inline-block;}
.tg-z{background:rgba(55,138,221,.1);color:#85B7EB;}.tg-n{background:rgba(99,153,34,.1);color:#97C459;}.tg-s{background:rgba(212,83,126,.1);color:#ED93B1;}
.kp{font-size:10px;color:var(--td);font-family:var(--m);margin-top:2px;display:inline-block;margin-left:6px;}
.ks{display:flex;border-top:1px solid var(--b);}
.ki{flex:1;padding:8px 12px;border-right:1px solid var(--b);text-align:center;}.ki:last-child{border-right:none;}
.kn{font-size:15px;font-weight:700;color:var(--g);font-family:var(--m);}.kl{font-size:10px;color:var(--td);margin-top:1px;}
.sg{margin:0 16px 16px;background:var(--s2);border:1px solid var(--b);border-radius:var(--radl);overflow:hidden;}
.sg-t{padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tm);border-bottom:1px solid var(--b);}
.sg-g{display:grid;grid-template-columns:repeat(3,1fr);}
.sg-i{padding:10px 12px;border-right:1px solid var(--b);display:flex;flex-direction:column;gap:5px;}.sg-i:last-child{border-right:none;}
.sg-p{display:flex;align-items:center;gap:6px;}
.sg-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.az{background:rgba(55,138,221,.2);color:var(--bl);}.an{background:rgba(99,153,34,.2);color:#97C459;}.as{background:rgba(212,83,126,.2);color:var(--pk);}
.sg-nm{font-size:12px;font-weight:500;}.sg-rl{font-size:10px;color:var(--td);}
.sg-btn{width:100%;padding:5px 0;border-radius:var(--rad);border:1px solid var(--bs);background:transparent;color:var(--tm);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--f);transition:all .15s;}
.sg-btn:hover:not(.on):not(.off){border-color:var(--g);color:var(--g);}
.sg-btn.on{background:var(--gd);border-color:var(--g);color:var(--g);cursor:default;}
.sg-btn.off{opacity:.3;cursor:not-allowed;}
.sg-ts{font-size:10px;color:var(--td);font-family:var(--m);}
.gb{padding:7px 12px;border-top:1px solid var(--b);display:flex;align-items:center;gap:7px;}
.gd2{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.gd2.lk{background:var(--td);}.gd2.pt{background:var(--a);}.gd2.op{background:var(--g);}
.gt{font-size:12px;color:var(--tm);flex:1;}.gt strong{color:var(--t);}
.ub{padding:5px 12px;border-radius:var(--rad);border:1px solid var(--g);background:var(--gd);color:var(--g);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--f);display:none;}
.ub.on{display:block;}.ub:hover{background:var(--g);color:#000;}
.cb{margin:8px 16px;padding:8px 12px;background:var(--gd);border:1px solid rgba(0,200,83,.3);border-radius:var(--rad);font-size:12px;color:var(--g);display:none;}
.cb.on{display:block;}
.mc-sec{margin-top:28px;}
.mc-hdr{font-size:11px;font-weight:600;letter-spacing:.08em;color:var(--td);text-transform:uppercase;padding-bottom:8px;border-bottom:1px solid var(--b);margin-bottom:4px;}
.mc-hdr span{color:var(--g);font-family:var(--m);text-transform:none;letter-spacing:0;font-size:11px;}
.mc-sub{font-size:12px;color:var(--tm);margin-bottom:14px;}
.mc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:30px;}
.mc{background:var(--s);border:1px solid var(--b);border-radius:var(--radl);padding:14px;display:flex;flex-direction:column;gap:8px;transition:border-color .15s;}
.mc:hover{border-color:var(--bs);}
.mc-top{display:flex;align-items:center;gap:8px;}
.mc-ic{font-size:17px;flex-shrink:0;}
.mc-ti{font-size:13px;font-weight:600;flex:1;}
.mc-tm{font-size:10px;font-family:var(--m);color:var(--g);background:var(--gd);padding:2px 6px;border-radius:3px;white-space:nowrap;}
.mc-lrn{font-size:12px;color:var(--tm);line-height:1.6;}.mc-lrn strong{color:var(--t);}
.mc-com{font-size:12px;color:var(--a);line-height:1.6;background:rgba(255,170,0,.05);border-radius:var(--rad);padding:7px 9px;border-left:2px solid var(--a);}
.mc-ms{font-size:11px;color:var(--td);}.mc-ms strong{color:var(--tm);}
.mc-btn{padding:5px 10px;border-radius:var(--rad);border:1px solid var(--bs);background:transparent;color:var(--tm);font-size:11px;cursor:pointer;font-family:var(--f);transition:all .15s;align-self:flex-start;}
.mc-btn:hover{border-color:var(--g);color:var(--g);}
.mv{padding:18px 22px;max-width:980px;}
.mn-nav{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--b);}
.mn-btn{padding:6px 12px;border-radius:var(--rad);border:1px solid var(--b);background:var(--s);color:var(--tm);font-size:12px;cursor:pointer;font-family:var(--f);transition:all .15s;}
.mn-btn:hover{border-color:var(--bs);color:var(--t);}
.mn-btn.on{border-color:var(--g);background:var(--gd);color:var(--g);}
.section{margin-bottom:26px;}
.sec-t{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--td);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--b);}
.card{background:var(--s);border:1px solid var(--b);border-radius:var(--radl);padding:14px 18px;margin-bottom:8px;}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px;}.card-body{font-size:13px;color:var(--tm);line-height:1.7;}
.tip{background:var(--gd);border:1px solid rgba(0,200,83,.2);border-radius:var(--rad);padding:9px 12px;font-size:12px;color:var(--g);margin:8px 0;}
.warn{background:rgba(255,170,0,.07);border:1px solid rgba(255,170,0,.2);border-radius:var(--rad);padding:9px 12px;font-size:12px;color:var(--a);margin:8px 0;}
.danger{background:rgba(255,68,68,.07);border:1px solid rgba(255,68,68,.2);border-radius:var(--rad);padding:9px 12px;font-size:12px;color:var(--r);margin:8px 0;}
.code{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:10px 14px;font-family:var(--m);font-size:12px;color:#97C459;margin:8px 0;line-height:1.9;overflow-x:auto;white-space:pre-wrap;}
.step{display:flex;gap:10px;margin-bottom:10px;}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--s2);border:1px solid var(--bs);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;color:var(--g);font-family:var(--m);margin-top:1px;}
.step-c{flex:1;}.step-t{font-size:13px;font-weight:600;margin-bottom:1px;}.step-b{font-size:12px;color:var(--tm);line-height:1.6;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pill{display:inline-block;font-size:11px;padding:2px 7px;border-radius:4px;margin:2px;font-weight:500;}
.pg{background:var(--gd);color:var(--g);}.pb{background:rgba(55,138,221,.12);color:var(--bl);}.pa{background:rgba(255,170,0,.1);color:var(--a);}.pp{background:rgba(212,83,126,.1);color:var(--pk);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--td);padding:6px 10px;border-bottom:1px solid var(--b);}
td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--tm);}
tr:last-child td{border-bottom:none;}
.li{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:13px;color:var(--tm);}
.li::before{content:'\u2192';color:var(--g);flex-shrink:0;margin-top:1px;}
.note{background:var(--s2);border-radius:var(--rad);padding:10px 14px;font-size:12px;color:var(--tm);margin-top:8px;border-left:3px solid var(--g);}
.signal{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;}
.spec-card{background:var(--s);border:1px solid var(--b);border-radius:var(--radl);overflow:hidden;margin-bottom:16px;}
.spec-header{padding:16px 20px;border-bottom:1px solid var(--b);background:var(--s2);}
.spec-job{font-size:17px;font-weight:700;margin-bottom:3px;}.spec-co{font-size:13px;color:var(--g);margin-bottom:8px;}
.spec-pills{display:flex;flex-wrap:wrap;gap:5px;}
.spec-pill{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.spec-body{padding:16px 20px;}
.stat-card{background:var(--s2);border:1px solid var(--b);border-radius:var(--radl);padding:12px 16px;text-align:center;}
.stat-num{font-size:20px;font-weight:700;font-family:var(--m);color:var(--g);line-height:1;margin-bottom:3px;}
.stat-lbl{font-size:11px;color:var(--td);text-transform:uppercase;letter-spacing:.06em;}
.insight{background:rgba(55,138,221,.05);border:1px solid rgba(55,138,221,.2);border-radius:var(--rad);padding:10px 12px;font-size:12px;color:var(--bl);margin:8px 0;}
.opp{background:rgba(212,83,126,.05);border:1px solid rgba(212,83,126,.2);border-radius:var(--rad);padding:10px 12px;font-size:12px;color:var(--pk);margin:8px 0;}
.spec-preview{background:var(--s);border:1px solid rgba(0,200,83,.3);border-radius:var(--radl);padding:16px 20px;margin:10px 0;font-size:13px;}
.spec-preview p{margin-bottom:7px;color:var(--tm);}
.tabs{display:flex;border-bottom:1px solid var(--b);margin-bottom:14px;}
.tab{padding:9px 14px;font-size:13px;font-weight:500;color:var(--tm);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.tab.on{color:var(--g);border-bottom-color:var(--g);}
.rp{background:linear-gradient(135deg,rgba(0,200,83,0.08),rgba(55,138,221,0.06));border:1px solid rgba(0,200,83,0.25);border-radius:var(--radl);padding:20px 22px;margin-bottom:20px;}
.rp-tag{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--g);margin-bottom:8px;}
.rp-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.rp-sub{font-size:13px;color:var(--tm);margin-bottom:14px;line-height:1.6;}
.rp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.rp-item{background:rgba(255,255,255,0.04);border-radius:var(--rad);padding:9px 12px;border:1px solid var(--b);}
.rp-item-label{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.rp-item-val{font-size:12px;color:var(--t);font-weight:500;}
.off-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(55,138,221,0.1);border:1px solid rgba(55,138,221,0.25);border-radius:4px;padding:3px 8px;font-size:11px;color:var(--bl);margin-bottom:10px;}
.atlas-role-link{background:var(--s2);border:1px solid var(--b);border-radius:var(--rad);padding:10px 12px;text-decoration:none;display:block;transition:border-color .15s;}
.atlas-role-link:hover{border-color:var(--g);}
.atlas-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:var(--gd);border:1px solid rgba(0,200,83,0.3);border-radius:var(--rad);font-size:11px;color:var(--g);text-decoration:none;font-weight:500;transition:all .15s;}
.atlas-btn:hover{background:var(--g);color:#000;}
.toast{position:fixed;bottom:18px;right:18px;background:var(--s2);border:1px solid var(--bs);border-radius:var(--radl);padding:9px 12px;font-size:12px;z-index:999;transform:translateY(60px);opacity:0;transition:all .25s;max-width:240px;}
.toast.on{transform:translateY(0);opacity:1;}
.toast-t{font-weight:600;margin-bottom:1px;color:var(--t);}.toast-b{font-size:11px;color:var(--tm);}
</style>
</head>
<body>

const MODS = {};

MODS['cv-library'] = `<div class="section"><div class="sec-t">What is CV Library?</div><div class="card"><div class="card-body">CV Library is one of the UK's largest job boards and CV databases. As a recruiter you have two uses: posting jobs to attract applicants, and searching the CV database to proactively find candidates. The database search is where most of your sourcing time is spent.</div></div></div>
<div class="section"><div class="sec-t">Running your first search</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Log in and go to CV Search</div><div class="step-b">From the recruiter dashboard click CV Search in the top nav. Search panel on the left, results on the right.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Enter keywords</div><div class="step-b">Start with the role stem. Fitter/Assembler: assembl* or fitt*. TIG Welder: TIG or welder. CNC: CNC or machinist or turner. Keep it simple first — add terms to narrow, remove terms to widen.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Set location and radius</div><div class="step-b">Enter HP19 or Aylesbury. Start with 20-mile radius. Thin results: extend to 30. Too many: tighten to 10.</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">Filter by last active</div><div class="step-b">Set "Last updated" to within 3\u20136 months. CVs older than a year are usually not in the market. This single filter removes most dead leads.</div></div></div>
<div class="step"><div class="step-n">5</div><div class="step-c"><div class="step-t">Review and shortlist</div><div class="step-b">Scan results. Look for: job title match, location, most recent employer, last active date. Flag strong profiles to your shortlist.</div></div></div>
</div>
<div class="section"><div class="sec-t">Boolean operators</div>
<table><thead><tr><th>Operator</th><th>What it does</th><th>Example</th></tr></thead><tbody>
<tr><td><span class="pill pg">AND</span></td><td>Both terms must appear</td><td>TIG AND stainless</td></tr>
<tr><td><span class="pill pb">OR</span></td><td>Either term</td><td>fitter OR assembler OR "assembly technician"</td></tr>
<tr><td><span class="pill pa">NOT</span></td><td>Excludes that term</td><td>welder NOT structural</td></tr>
<tr><td><span class="pill pp">"quotes"</span></td><td>Exact phrase</td><td>"heat exchanger" OR "pressure vessel"</td></tr>
<tr><td><span class="pill pg">(brackets)</span></td><td>Groups terms</td><td>(TIG OR MIG) AND (stainless OR copper)</td></tr>
</tbody></table>
<div class="code">Fitter / Assembler: (assembl* OR fitt*) AND (precision OR engineering OR defence OR aerospace OR manufacturing)
TIG Welder: (TIG OR welder OR weld*) AND (stainless OR copper OR aluminium OR fabricat*)
CNC Machinist: (CNC OR machinist OR turner OR miller) AND (precision OR engineering OR aerospace OR defence)</div>
<div class="tip">The asterisk * is a wildcard. fabricat* matches fabricate, fabricator, fabrication.</div>
</div>
<div class="section"><div class="sec-t">Saved searches and alerts</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Save your search</div><div class="step-b">Once you have a working string, click Save Search and name it clearly \u2014 e.g. "TIG Welder HP19 20mi" or "Fitter Assembler Aylesbury".</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Set a CV alert</div><div class="step-b">Enable Email Alert on your saved search, set to daily. CV Library emails you when new matching CVs are uploaded. Passive sourcing that runs while you work other roles.</div></div></div>
<div class="warn">Delete alerts for roles you have filled. A cluttered inbox trains you to ignore everything \u2014 including the important ones.</div>
</div>
<div class="section"><div class="sec-t">Watchdogs</div>
<div class="card"><div class="card-body">A Watchdog is a saved search string. CV Library runs it continuously in the background and emails you the CV of any candidate who matches it whenever they log in, update their profile, or make any change to their CV Library account. You are not monitoring a specific person \u2014 you are monitoring a live search. Every match that hits your criteria lands in your inbox automatically.</div></div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Build your search string first</div><div class="step-b">Run a CV Library search with your boolean string and filters until you are getting good results. The quality of your Watchdog is entirely determined by the quality of the string behind it. A vague string sends you junk. A tight, accurate string sends you placeable candidates.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Save it as a Watchdog</div><div class="step-b">Once the search is returning the right kind of results, save it. In CV Library, after running a search you will see a "Save search" or "Create Watchdog" option. Name it clearly \u2014 e.g. "TIG Welder HP19 25mi stainless coded" so you know exactly what it covers when it fires.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Set the notification frequency</div><div class="step-b">Daily is the right setting for active roles. You want to be first to a relevant CV \u2014 not find out three days late that someone perfect logged on and has already been called by three other recruiters.</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">What triggers a notification</div><div class="step-b">Any candidate who matches your search string and logs into CV Library, updates their CV, or makes any change to their account. CV Library emails you their CV directly. This is passive candidate flow \u2014 it runs while you are doing everything else.</div></div></div>
<div class="step"><div class="step-n">5</div><div class="step-c"><div class="step-t">Manage your Watchdogs actively</div><div class="step-b">A Watchdog for a filled role keeps firing and fills your inbox with CVs you will never use. Delete or pause Watchdogs the moment a role is filled. Keep only active role strings running. One irrelevant Watchdog firing daily trains you to ignore your inbox \u2014 and that is when you miss the good ones.</div></div></div>
<div class="tip">Your Watchdog strings should be the same tight boolean strings you use for active searches. If the string is good enough to find candidates manually, it is good enough to run as a Watchdog. If it is not, fix the string before saving it.</div>
<div class="warn">A poor Watchdog string is worse than no Watchdog at all. Irrelevant CVs flooding your inbox desensitises you to the alerts. Get the string right, then save it.</div>
</div>

<div class="section"><div class="sec-t">What to look for when reviewing</div>
<div class="g2">
<div class="card"><div class="card-title" style="color:var(--g)">Green flags</div><div class="card-body">Job title matches the STT role. Based within 25 miles of HP19. Active in last 3 months. Stable employment history. Specific equipment or materials named that match the spec.</div></div>
<div class="card"><div class="card-title" style="color:var(--r)">Red flags</div><div class="card-body">CV last updated over a year ago. Too many short tenures under 6 months. Location borderline \u2014 check commute to Aylesbury. Vague about equipment used or tolerances worked to.</div></div>
</div></div>`;

MODS['indeed'] = `<div class="section"><div class="sec-t">Indeed for recruiters \u2014 two modes</div>
<div class="g2">
<div class="card"><div class="card-title">Job posting (active)</div><div class="card-body">You post a job ad and wait for applications. Syntech uses Indeed for this on most roles. The INDC tag tracks which applications came from Indeed.</div></div>
<div class="card"><div class="card-title">Resume search (proactive)</div><div class="card-body">You search Indeed's CV database directly. Useful when a role is urgent and you cannot wait for applications to come in.</div></div>
</div></div>
<div class="section"><div class="sec-t">The INDC tracking tag</div>
<div class="card"><div class="card-body">Every Syntech job ad on Indeed ends with <strong style="color:var(--g);font-family:var(--m)">INDC</strong>. IN = Indeed platform. D = Direct post. C = standard campaign. It lets us see which applications came from Indeed vs other sources. Always include the correct tag before posting.</div></div>
<div class="warn">Wrong tag or no tag means broken tracking. If unsure which tag to use, ask Zac before posting.</div>
</div>
<div class="section"><div class="sec-t">Resume search — proactive sourcing</div>
<div class="card"><div class="card-body">Resume search is Indeed's CV database. You search it directly rather than waiting for applicants. It sits under the employer dashboard — look for "Search CVs" or "Resume Search" in the top navigation. If you cannot see it, your account may not have it enabled — check with Nick.</div></div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Access Resume Search</div><div class="step-b">Log into the Syntech Indeed employer account. Navigate to Search CVs or Resume Search in the top nav. You land on a search panel — keywords on the left, location and radius below, results on the right.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Enter your search</div><div class="step-b">Job title field: put the role title — "TIG welder", "mechanical fitter", "CNC machinist". Skills/keywords field: add specifics — "stainless steel", "engineering drawings", "Fanuc". Indeed's search engine is less powerful than CV Library, so keep it simple. One or two strong terms beats a long string.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Set location and radius</div><div class="step-b">Enter Aylesbury or HP19. Start at 25 miles. Indeed candidate locations are self-reported and may be imprecise — a few miles of margin helps. Note: Indeed skews toward candidates without cars, so always ask about transport in your first call.</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">Filter by recency</div><div class="step-b">Set "Last active" to within 30 days first. If results are thin, open to 90 days. Candidates active in the last month are far more likely to respond. The green activity dot on a result means they have been on Indeed recently — contact these first.</div></div></div>
<div class="step"><div class="step-n">5</div><div class="step-c"><div class="step-t">Review results and qualify before contacting</div><div class="step-b">Scan each result for: job title match, location, most recent employer, recency. Click into the CV before messaging. Do not contact anyone you have not read — a generic message to someone who is clearly not suitable wastes your time and theirs.</div></div></div>
<div class="step"><div class="step-n">6</div><div class="step-c"><div class="step-t">Contact via Indeed message</div><div class="step-b">Click Contact on their profile. Write 3 lines max: who you are, the role and location, one specific reason it suits them based on what you just read. End with a question. Do not paste the job spec. Do not ask them to call you — ask if they are open to hearing more. Add anyone worth progressing to Atlas immediately, source: Indeed.</div></div></div>
<div class="tip">Resume search results go stale fast. Run the search, work the results the same day. A candidate who was active this morning may have accepted an offer by Friday.</div>
<div class="warn">Indeed resume search has a contact limit per month on most plans. Do not burn contacts on candidates you have not properly qualified. Check with Nick on the account limits before running a bulk search.</div>
</div>
<div class="section"><div class="sec-t">Boolean strings for STT live roles</div>
<div class="code">Fitter / Assembler: (assembl* OR fitt*) AND (precision OR engineering OR manufacturing)
TIG Welder: (TIG OR welder) AND (stainless OR copper OR aluminium)
CNC Machinist: (CNC OR machinist OR turner) AND (precision OR engineering)</div>
<div class="tip">Keep Indeed strings shorter than CV Library \u2014 the engine is less powerful. Strip back if zero results, build up from one or two key terms.</div>
</div>
<div class="section"><div class="sec-t">Sponsored vs organic</div>
<table><thead><tr><th>Type</th><th>Cost</th><th>Visibility</th><th>When to use</th></tr></thead><tbody>
<tr><td>Organic</td><td>Free</td><td>Appears in results, drops over time</td><td>All roles \u2014 always post organic first</td></tr>
<tr><td>Sponsored</td><td>Pay per click</td><td>Pushed to top, stays visible</td><td>Urgent fills, hard-to-find candidates</td></tr>
</tbody></table>
<div class="warn">Sponsored posts have a daily budget \u2014 if used up by midday the ad stops showing. Check spend with Nick before sponsoring a role.</div>
</div>
<div class="section"><div class="sec-t">Candidate management on Indeed \u2014 keeping your pipeline clean</div>
<div class="step"><div class="step-n">1</div><div class="step-c"><div class="step-t">Check applications daily</div><div class="step-b">Review every new application the same day it arrives. Stale applications reduce your ad visibility.</div></div></div>
<div class="step"><div class="step-n">2</div><div class="step-c"><div class="step-t">Action every application</div><div class="step-b">Shortlisted / Not suitable / Pending. Do not leave applications in limbo.</div></div></div>
<div class="step"><div class="step-n">3</div><div class="step-c"><div class="step-t">Send decline messages promptly</div><div class="step-b">"Thank you for applying. After careful review we will not be progressing your application on this occasion. We will keep your details on file for future opportunities."</div></div></div>
<div class="step"><div class="step-n">4</div><div class="step-c"><div class="step-t">Add shortlisted candidates to Atlas immediately</div><div class="step-b">Anyone you intend to call goes into Atlas before you call them. Source field: Indeed.</div></div></div>
<div class="step"><div class="step-n">5</div><div class="step-c"><div class="step-t">Close applications when a role is filled</div><div class="step-b">Pause or close the Indeed ad immediately once a role is placed. Do not leave a filled role live.</div></div></div>
<div class="tip">Indeed scores recruiters on response rate. Maintaining a high response rate keeps your ads visible to more candidates.</div>
<div class="warn">Always confirm a candidate can do the required shift before progressing them. Shift patterns at STT are fixed \u2014 there is no flexibility.</div>
</div>`;

MODS['xray'] = `<div class="section"><div class="sec-t">What is X-Ray searching?</div>
<div class="card"><div class="card-body">X-Ray searching uses Google's advanced operators to search inside specific websites \u2014 including LinkedIn, CV databases and personal sites. Many strong candidates have their LinkedIn profile indexed by Google even if they are not actively on job boards. X-Ray finds them.</div></div>
</div>
<div class="section"><div class="sec-t">Core operators</div>

MODS['delays'] = `<div class="section"><div class="sec-t">Why pipelines stall</div>
<div class="card"><div class="card-body">Every recruitment pipeline has natural friction points. Most delays are predictable \u2014 you can see them coming and act before a candidate withdraws or a client loses interest.</div></div>
</div>
<div class="section"><div class="sec-t">The delay map</div>
<table><thead><tr><th>Stage</th><th>Common delay</th><th>How to unblock</th></tr></thead><tbody>
<tr><td><span class="signal" style="background:var(--bl)"></span>Brief received</td><td>No reply to questions. Brief is vague.</td><td>Call \u2014 do not email. Ask: "What is the number one skill this person needs?"</td></tr>
<tr><td><span class="signal" style="background:var(--a)"></span>CVs submitted</td><td>Client not responding. No feedback after 48h.</td><td>Call, not email. If still no reply after second chase \u2014 escalate to Steve.</td></tr>
<tr><td><span class="signal" style="background:var(--a)"></span>Interview arranged</td><td>Client keeps rescheduling.</td><td>Confirm with calendar invite. Rescheduling more than once is a red flag \u2014 flag to Steve.</td></tr>
<tr><td><span class="signal" style="background:var(--r)"></span>Post-interview</td><td>Client goes quiet. No feedback for 72+ hours.</td><td>Call the client same day of interview. "How did it go?" Do not wait for them to call you.</td></tr>
<tr><td><span class="signal" style="background:var(--r)"></span>Offer stage</td><td>Client delays making offer. Candidate gets counter-offered.</td><td>For client: "I need to let the candidate know by [date]." Pre-handle counter-offers before they happen.</td></tr>
<tr><td><span class="signal" style="background:var(--a)"></span>Notice period</td><td>Client gets impatient.</td><td>Keep regular contact with the candidate. Manage client expectations actively.</td></tr>
</tbody></table>
</div>
<div class="section"><div class="sec-t">Escalation rules</div>
<div class="card"><div class="card-title" style="color:var(--a)">Flag to Zac when</div><div class="card-body">You have chased a client twice with no response. A candidate is becoming unresponsive. You are unsure how to handle a candidate objection.</div></div>
<div class="card"><div class="card-title" style="color:var(--r)">Flag to Steve immediately when</div><div class="card-body">A client mentions another agency. An offer is delayed by more than 48 hours. A candidate withdraws or accepts a counter-offer. A client pauses the role. You receive any complaint.</div></div>
<div class="danger">Never try to handle a client complaint or a withdrawal alone. These situations can be rescued \u2014 but only if Steve knows in time.</div>
</div>
<div class="section"><div class="sec-t">Counter-offers</div>
<div class="card"><div class="card-body">Handle it before it happens. During qualification ask: "If your current employer matched the salary to keep you, would you still leave?" Most candidates have a reason to move that is not just money. Find that reason and remind them of it throughout the process.<br><br>If their only reason to move is salary, they are a high counter-offer risk \u2014 flag to Steve immediately.</div></div>
<div class="tip">Candidates who have already been counter-offered once are very likely to be counter-offered again. Ask: "Has this happened to you before?"</div>
</div>
<div class="section"><div class="sec-t">Early warning checklist</div>
<div class="warn">If any of these are true, a placement may be at risk \u2014 act immediately.</div>
<div class="card"><div class="card-body">Client has not responded to CVs within 48 hours<br>Candidate says "I need to think about it" after an offer<br>Interview has been rescheduled more than once<br>Client mentions "budget review" or "headcount freeze"<br>Candidate's tone shifts \u2014 less enthusiastic than before<br>Role brief changes significantly mid-search<br>You have not spoken to the candidate or client in 5+ days</div></div>
</div>`;

function jTab2(id,el){['fa','cnc','tw','b'].forEach(x=>{const p=document.getElementById('jp2-'+x);const t=document.getElementById('jt-'+x);if(p)p.style.display=x===id?'block':'none';if(t)t.classList.toggle('on',x===id);});}
function goModule(id){setView('modules');const btns=document.querySelectorAll('.mn-btn');const ids=['cv-library','indeed','xray','linkedin','atlas','revmkt','comms','delays','jobs','camberley'];const idx=ids.indexOf(id);if(idx>=0)setMod(id,btns[idx]);}
function render(){syncLocks();renderSidebar();renderOverview();renderPlan();}
function syncLocks(){const stages=STAGES[CUR];stages.forEach((s,i)=>{s._locked=i>0&&!stageDone(stages[i-1]);});}
function renderSidebar(){const stages=STAGES[CUR];let h='<div class="sb-sec">Stages</div>';stages.forEach((s,i)=>{const dn=stageDone(s),lk=s._locked;const c=taskCount(s);const dot=dn?'dn':lk?'lk':'';const bg=dn?'<span class="sb-bg bg-d">Done</span>':lk?'<span class="sb-bg bg-l">Locked</span>':`<span class="sb-bg bg-a">${c.dn}/${c.tot}</span>`;h+=`<div class="sb-row" onclick="scrollToStage('${s.id}')"><div class="sb-dot ${dot}"></div><div class="sb-nm">${s.title.split('\u2014')[1]?.trim()||s.title}</div>${bg}</div>`;});document.getElementById('sidebar').innerHTML=h;}
function renderOverview(){const p=totalProg();const ti=CUR==='aya'?{nm:'Aya',rl:'Trainee Delivery Consultant',cl:'#378ADD',in:'AY'}:{nm:'Jade',rl:'Delivery Consultant',cl:'#D4537E',in:'JD'};const cmp=STAGES[CUR].filter(s=>stageDone(s)).length;document.getElementById('overview').innerHTML=`<div class="tc"><div class="av" style="background:${ti.cl}22;color:${ti.cl}">${ti.in}</div><div><div style="font-size:12px;font-weight:500">${ti.nm}</div><div style="font-size:10px;color:var(--tm)">${ti.rl}</div></div></div><div><div class="ov-n">${p.dn}</div><div class="ov-l">Tasks done</div></div><div><div class="ov-n">${cmp}</div><div class="ov-l">Stages complete</div></div><div style="flex:1"><div class="pt"><div class="pf" style="width:${p.pct}%"></div></div><div class="ov-l">${p.pct}% complete \u2014 ${p.tot-p.dn} remaining</div></div>`;}
function renderPlan(){const stages=STAGES[CUR];const ti=CUR==='aya'?'Aya':'Jade';let h=CUR==='aya'?RP_AYAAN:RP_JADE;stages.forEach((s,i)=>{const lk=s._locked,dn=stageDone(s),c=taskCount(s);let cls='sc';if(dn)cls+=' dn';if(lk)cls+=' lk';h+=`<div class="${cls}" id="${s.id}"><div class="sh" onclick="toggleStage('${s.id}')"><div class="sn">${lk?'&#128274;':dn?'&#10003;':i+1}</div><div style="flex:1"><div class="st">${s.title}</div><div class="ss">${s.sub}</div></div><div style="display:flex;align-items:center;gap:7px;flex-shrink:0"><span class="wt ${s.wc}">${s.wk}</span><span style="font-size:10px;color:var(--td);font-family:var(--m)">${c.dn}/${c.tot}</span></div><svg class="cv" width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="sb2">`;if(lk){h+=`<div style="background:rgba(255,170,0,0.06);border-bottom:1px solid rgba(255,170,0,0.15);padding:8px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--a)"><span>&#128274;</span> Stage locked \u2014 complete the previous stage first.</div>`;}s.pillars.forEach(pl=>{const pd=pl.tasks.filter(t=>isChk(t.id)).length;h+=`<div class="ps"><div class="ph"><div class="pd" style="background:${pl.cl}"></div><div class="pn" style="color:${pl.cl}">${pl.nm}</div><div class="pp">${pd}/${pl.tasks.length}</div></div><div class="tl">`;pl.tasks.forEach(t=>{const ck=isChk(t.id);h+=`<div class="ti${ck?' dn':''}" id="tr-${t.id}"><div class="ck${ck?' on':''}" onclick="doCheck('${t.id}','${s.id}')"></div><div><div class="tx">${t.tx}</div><span class="tg tg-${pl.ow}">${pl.ow==='z'?'zac':pl.ow==='n'?'nick':'steve'}</span><span class="kp">${t.kp}</span></div></div>`;});h+=`</div></div>`;});if(dn)h+=`<div class="cb on">&#10003; Stage complete \u2014 all tasks done and all three managers have signed off.</div>`;h+=`<div class="ks">${s.kpis.map(kp=>`<div class="ki"><div class="kn">${kp.n}</div><div class="kl">${kp.l}</div></div>`).join('')}</div>`;const canSign=allDone(s)&&!lk;const sgnCnt=['z','n','s'].filter(p=>isSgn(s.id,p)).length;const pNm={z:'Zac',n:'Nick',s:'Steve'},pRl={z:'Delivery & Pitch',n:'ATS & Commercial',s:'BD & Quality'},pAv={z:'az',n:'an',s:'as'};h+=`<div class="sg"><div class="sg-t">&#9999; Stage sign-off \u2014 all three managers must approve before progression</div><div class="sg-g">`;['z','n','s'].forEach(p=>{const sg=isSgn(s.id,p),ts=sgnTs(s.id,p);const bc=sg?'on':canSign?'':'off';h+=`<div class="sg-i"><div class="sg-p"><div class="sg-av ${pAv[p]}">${pNm[p][0]}</div><div><div class="sg-nm">${pNm[p]}</div><div class="sg-rl">${pRl[p]}</div></div></div><button class="sg-btn ${bc}" onclick="doSign('${p}','${s.id}')">${sg?'&#10003; Signed off':'Sign off'}</button>${ts?`<div class="sg-ts">${ts}</div>`:''}</div>`;});h+=`</div>`;let gd2='lk',gt='',showUnlk=false;const nxt=stages[i+1];if(lk){gd2='lk';gt=`<strong>Stage locked</strong> \u2014 complete the previous stage and get all three sign-offs first`;}else if(!canSign){gt=`Complete all <strong>${c.tot-c.dn} remaining tasks</strong> before sign-off can begin`;}else if(sgnCnt<3){gd2='pt';const rem=['z','n','s'].filter(p=>!isSgn(s.id,p)).map(p=>pNm[p]).join(', ');gt=`${sgnCnt}/3 signed \u2014 waiting on <strong>${rem}</strong>`;}else if(!dn){gd2='op';gt='All 3 sign-offs complete \u2014 <strong>ready to unlock next stage</strong>';if(nxt)showUnlk=true;}else{gd2='op';gt='<strong>Stage complete</strong> \u2014 next stage unlocked';}h+=`<div class="gb"><div class="gd2 ${gd2}"></div><div class="gt">${gt}</div><button class="ub${showUnlk?' on':''}" onclick="doUnlock('${s.id}','${nxt?.id||''}')">Unlock stage ${i+2} &#8594;</button></div></div>`;h+=`</div></div>`;});const cards=MC[CUR];h+=`<div class="mc-sec"><div class="mc-hdr">Training Modules <span>\u2014 THAT TURN YOU INTO A \u00a320K+ PER MONTH BILLER</span></div><div class="mc-sub">What ${ti} will master \u2014 and exactly why it matters commercially.</div><div class="mc-grid">`;cards.forEach(m=>{h+=`<div class="mc"><div class="mc-top"><span class="mc-ic">${m.ic}</span><div class="mc-ti">${m.ti}</div><span class="mc-tm">${m.tm}</span></div><div class="mc-lrn"><strong>What ${ti} masters:</strong> ${m.lrn}</div><div class="mc-com">&#128176; ${m.com}</div><div class="mc-ms">&#127919; <strong>Milestone:</strong> ${m.ms}</div><button class="mc-btn" onclick="goModule('${m.id}')">Open full module &#8594;</button></div>`;});h+=`</div></div>`;document.getElementById('plan-main').innerHTML=h;stages.forEach(s=>{const el=document.getElementById(s.id);if(el)el.classList.add('op');});}
function toggleStage(id){const el=document.getElementById(id);if(el)el.classList.toggle('op');}
function scrollToStage(id){const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
async function doCheck(tid,sid){
  const key=k(tid);
  S[key]=!S[key];
  const row=document.getElementById('tr-'+tid);
  if(row){row.classList.toggle('dn',!!S[key]);const box=row.querySelector('.ck');if(box)box.classList.toggle('on',!!S[key]);}
  render();
  const el=document.getElementById(sid);if(el)el.classList.add('op');
  if(S[key])showToast('&#10003; Task complete','Speed is everything \u2014 keep going.');
  await sbUpsert(key,S[key]);
}
async function doSign(p,sid){
  const s=STAGES[CUR].find(x=>x.id===sid);
  if(!s||isSgn(sid,p)||!allDone(s))return;
  const soKey=k('so_'+sid+'_'+p);
  const tsKey=k('ts_'+sid+'_'+p);
  S[soKey]=true;
  const now=new Date();
  const ts=now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+' '+now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  S[tsKey]=ts;
  const nm={z:'Zac',n:'Nick',s:'Steve'}[p];
  showToast(`&#9997; ${nm} signed off`,'Sign-off recorded and timestamped.');
  render();
  const el=document.getElementById(sid);if(el)el.classList.add('op');
  await sbUpsert(soKey,true);
  await sbUpsert(tsKey,ts);
}
async function doUnlock(sid,nid){
  if(!allSgn(sid))return;
  const key=k('ul_'+sid);
  S[key]=true;
  showToast('&#128640; Next stage unlocked!','All three sign-offs accepted.');
  render();
  await sbUpsert(key,true);
  if(nid)setTimeout(()=>{const el=document.getElementById(nid);if(el){el.classList.add('op');el.scrollIntoView({behavior:'smooth',block:'start'});}},300);
}
function setTrainee(name){CUR=name;document.getElementById('btn-a').classList.toggle('on',name==='aya');document.getElementById('btn-j').classList.toggle('on',name==='jade');render();}
async function doReset(){
  if(!confirm('Reset ALL progress for '+(CUR==='aya'?'Aya':'Jade')+'? Cannot be undone.'))return;
  Object.keys(S).forEach(key=>{if(key.startsWith(CUR+'_'))delete S[key];});
  render();
  showToast('&#8635; Progress reset','Training plan cleared.');
  await sbDelete(CUR+'_');
}
let _tt;
function showToast(title,body){const el=document.getElementById('toast');document.getElementById('toast-t').textContent=title;document.getElementById('toast-b').textContent=body;el.classList.add('on');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('on'),3000);}
// Async init: load from Supabase then render, then start polling
(async()=>{
  await ld();
  render();
  setMod('cv-library',document.querySelector('.mn-btn'));
  startPolling();
})();
</script>
